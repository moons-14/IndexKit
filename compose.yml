services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: indexkit
      POSTGRES_USER: indexkit
      POSTGRES_PASSWORD: indexkit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexkit"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://indexkit:indexkit@db:5432/indexkit
      BETTER_AUTH_SECRET: changeme
      BETTER_AUTH_URL: http://localhost:3001
      THUMBNAIL_DIR: /data/thumbnails
      WORKER_COUNT: "4"
      WEB_URL: http://localhost:3000
      TRUSTED_ORIGINS: http://localhost:3000
    volumes:
      - ${LIBRARY_PATH:-/tmp/library}:/library:ro
      - thumbnails:/data/thumbnails

  web:
    build:
      context: .
      target: web
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_URL: http://api:3001

  # デバッグ用: コンテナを起動してコマンドを手動実行できる
  dev:
    build: .
    volumes:
      - ${LIBRARY_PATH:-/tmp/test-library}:/library:ro
    environment:
      LIBRARY_PATH: /library
      WORKER_COUNT: "4"
    entrypoint: ["sh"]
    profiles: ["debug"]

  # library-scanner: ディレクトリ走査ベンチマーク
  scanner-bench:
    build: .
    volumes:
      - ${LIBRARY_PATH:-/tmp/test-library}:/library:ro
    environment:
      LIBRARY_PATH: /library
      WORKER_COUNT: "4"
    command:
      - node
      - packages/library-scanner/dist/bench/scan-bench.js
      - --count=10000
    profiles: ["bench"]

  # library-scanner: メタデータ+サムネイル抽出ベンチマーク
  extract-bench:
    build: .
    volumes:
      - ${LIBRARY_PATH:-/tmp/test-library}:/library:ro
    environment:
      LIBRARY_PATH: /library
    command:
      - node
      - packages/library-scanner/dist/bench/extract-bench.js
      - --count=100
    profiles: ["bench"]

volumes:
  pgdata: {}
  thumbnails: {}
